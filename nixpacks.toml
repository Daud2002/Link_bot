# Railway / Nixpacks build config for the WhatsApp link-bot.
# Goal: run on the cheap 1GB plan by using a lightweight system Chromium
# instead of Puppeteer's bundled full Chrome.

[phases.setup]
# Full system chromium from nixpkgs (lighter at runtime than bundled Chrome),
# plus a pinned Node LTS. Nixpacks keeps these in the runtime image too.
nixPkgs = ["nodejs_20", "chromium"]

[phases.install]
# Skip Puppeteer's ~400MB Chrome download — we use the system chromium above.
# `npm install` (not `npm ci`): package-lock.json is gitignored, so it isn't
# guaranteed to be present in the deployed repo.
cmds = ["PUPPETEER_SKIP_DOWNLOAD=1 npm install"]

[phases.build]
# Resolve the hashed /nix/store path of chromium once and persist it for the
# start phase. The hash changes on every rebuild, so we never hardcode it.
cmds = ["echo \"export PUPPETEER_EXECUTABLE_PATH=$(which chromium)\" > /app/.chromium-env"]

[start]
# Source the resolved chromium path, then start Node with a capped heap.
cmd = "bash -c 'source /app/.chromium-env && node --no-deprecation --max-old-space-size=256 index.js'"

[variables]
PUPPETEER_SKIP_DOWNLOAD = "1"
NODE_ENV = "production"
# Tag for the memory harness logs. Set to "optimized" once measuring the
# optimized build; leave/override as needed.
MEM_TAG = "optimized"
